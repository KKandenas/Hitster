<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hitster Slumpare</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

<nav class="nav-bar">
    <a href="index.html" class="nav-btn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 11.5 12 4l9 7.5"/><path d="M5 10v9a1 1 0 0 0 1 1h4v-6h4v6h4a1 1 0 0 0 1-1v-9"/></svg>
        Hem
    </a>
    <a href="hitsterbingo.html" class="nav-btn accent">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7" rx="1.5"/><rect x="14" y="3" width="7" height="7" rx="1.5"/><rect x="3" y="14" width="7" height="7" rx="1.5"/><rect x="14" y="14" width="7" height="7" rx="1.5"/></svg>
        Visa Bingo
    </a>
</nav>

<main class="container">
    <div class="eyebrow">Gemensam telefon</div>
    <h1 class="title">Hitster Slumpare</h1>

    <button class="action-btn" id="slumpBtn" onclick="slumpaUtmaning()">
        <svg viewBox="0 0 100 100" fill="none" aria-hidden="true">
            <circle cx="50" cy="50" r="46" fill="#1a0b14" stroke="#1a0b14" stroke-width="2"/>
            <circle cx="50" cy="50" r="36" stroke="rgba(255,255,255,0.35)" stroke-width="1.5"/>
            <circle cx="50" cy="50" r="26" stroke="rgba(255,255,255,0.3)" stroke-width="1.5"/>
            <circle cx="50" cy="50" r="14" fill="#1a0b14" stroke="rgba(255,255,255,0.5)" stroke-width="1.5"/>
            <circle cx="50" cy="50" r="4" fill="rgba(255,255,255,0.6)"/>
        </svg>
        Slumpa Utmaning!
    </button>

    <div id="resultatBox">
        <div class="result-icon" id="utmaningIkon"></div>
        <div class="utmaning-titel" id="utmaningTitel"></div>
        <div class="utmaning-info" id="utmaningInfo"></div>
    </div>
</main>

<script>
const valen = [
    {
        titel: "Årtal ± 2 år",
        info: "Gissa vilket år låten släpptes. Du vinner poäng/kortet om du är max 2 år ifrån det rätta svaret.",
        farg: "var(--c-ar2)",
        ikon: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="17" rx="2"/><path d="M3 9h18M8 2v4M16 2v4"/></svg>'
    },
    {
        titel: "Årtal ± 4 år",
        info: "Gissa vilket år låten släpptes. Du får en generös felmarginal på upp till 4 år åt båda hållen!",
        farg: "var(--c-ar4)",
        ikon: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="17" rx="2"/><path d="M3 9h18M8 2v4M16 2v4"/></svg>'
    },
    {
        titel: "Årtionde",
        info: "Du behöver inte pricka exakt år. Det räcker att du gissar rätt årtionde (t.ex. 80-talet, 90-talet).",
        farg: "var(--c-artionde)",
        ikon: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3.5 2"/></svg>'
    },
    {
        titel: "Före eller efter 2000?",
        info: "Det enklaste valet! Gissa bara om låten släpptes före år 2000, eller år 2000 och senare.",
        farg: "var(--c-sekel)",
        ikon: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2v20M5 5h9l-2 3 2 3H5"/></svg>'
    },
    {
        titel: "Artist",
        info: "Glöm årtalet! För att ta poäng på den här låten måste du kunna namnet på artisten eller gruppen.",
        farg: "var(--c-artist)",
        ikon: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="2" width="6" height="12" rx="3"/><path d="M5 10a7 7 0 0 0 14 0M12 17v4M9 21h6"/></svg>'
    }
];

let slumpar = false;

function slumpaUtmaning() {
    if (slumpar) return;
    slumpar = true;

    const btn = document.getElementById('slumpBtn');
    const resultatBox = document.getElementById('resultatBox');
    const utmaningTitel = document.getElementById('utmaningTitel');
    const utmaningInfo = document.getElementById('utmaningInfo');
    const utmaningIkon = document.getElementById('utmaningIkon');

    btn.classList.add('spinning');
    resultatBox.classList.remove('show');

    // Kort "rullande" effekt genom alternativen innan slutresultatet visas
    let varv = 0;
    const maxVarv = 10;
    const rullning = setInterval(() => {
        const slumpVisning = valen[Math.floor(Math.random() * valen.length)];
        utmaningTitel.innerText = slumpVisning.titel;
        utmaningTitel.style.color = slumpVisning.farg;
        resultatBox.style.setProperty('--card-glow', slumpVisning.farg);
        resultatBox.style.display = 'block';
        varv++;

        if (varv >= maxVarv) {
            clearInterval(rullning);

            const vald = valen[Math.floor(Math.random() * valen.length)];
            utmaningTitel.innerText = vald.titel;
            utmaningInfo.innerText = vald.info;
            utmaningIkon.innerHTML = vald.ikon;

            utmaningTitel.style.color = vald.farg;
            utmaningIkon.style.color = vald.farg;
            resultatBox.style.setProperty('--card-glow', vald.farg);

            resultatBox.classList.remove('show');
            void resultatBox.offsetWidth; // starta om reveal-animationen
            resultatBox.classList.add('show');

            btn.classList.remove('spinning');
            slumpar = false;
        }
    }, 60);
}
</script>

</body>
</html>
