<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hitsterbingo</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

<main class="container">
    <svg class="vinyl-logo" viewBox="0 0 100 100" fill="none" aria-hidden="true">
        <circle cx="50" cy="50" r="48" fill="#0c0a1f" stroke="url(#gHomeRing)" stroke-width="2"/>
        <circle cx="50" cy="50" r="38" stroke="rgba(255,255,255,0.12)" stroke-width="1"/>
        <circle cx="50" cy="50" r="30" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
        <circle cx="50" cy="50" r="22" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
        <circle cx="50" cy="50" r="15" fill="url(#gHomeLabel)"/>
        <circle cx="50" cy="50" r="4" fill="#0c0a1f"/>
        <defs>
            <linearGradient id="gHomeRing" x1="0" y1="0" x2="100" y2="100">
                <stop stop-color="#ff2e88"/>
                <stop offset="0.5" stop-color="#a855f7"/>
                <stop offset="1" stop-color="#22d3ee"/>
            </linearGradient>
            <linearGradient id="gHomeLabel" x1="0" y1="0" x2="100" y2="100">
                <stop stop-color="#ff2e88"/>
                <stop offset="1" stop-color="#22d3ee"/>
            </linearGradient>
        </defs>
    </svg>

    <div class="eyebrow">Party edition</div>
    <h1 class="title">Hitsterbingo</h1>
    <div class="subtitle">Välkommen! Välj ett verktyg nedan för att starta spelkvällen.</div>

    <a href="generator.html" class="menu-link primary">
        <span class="icon-badge">
            <svg viewBox="0 0 24 24" fill="none" stroke="#1a0b14" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <rect x="3" y="3" width="18" height="18" rx="4"/>
                <circle cx="8" cy="8" r="1.4" fill="#1a0b14" stroke="none"/>
                <circle cx="16" cy="8" r="1.4" fill="#1a0b14" stroke="none"/>
                <circle cx="12" cy="12" r="1.4" fill="#1a0b14" stroke="none"/>
                <circle cx="8" cy="16" r="1.4" fill="#1a0b14" stroke="none"/>
                <circle cx="16" cy="16" r="1.4" fill="#1a0b14" stroke="none"/>
            </svg>
        </span>
        <span class="label-block">
            <span class="label">Slumpgenerator</span>
            <span class="desc">Slumpa nästa musikutmaning till bordet.</span>
        </span>
        <svg class="chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 6l6 6-6 6"/></svg>
    </a>

    <a href="hitsterbingo.html" class="menu-link">
        <span class="icon-badge">
            <svg viewBox="0 0 24 24" fill="none" stroke="#22d3ee" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <rect x="3" y="3" width="7" height="7" rx="1.5"/>
                <rect x="14" y="3" width="7" height="7" rx="1.5"/>
                <rect x="3" y="14" width="7" height="7" rx="1.5"/>
                <rect x="14" y="14" width="7" height="7" rx="1.5"/>
            </svg>
        </span>
        <span class="label-block">
            <span class="label">Bingobricka</span>
            <span class="desc">Öppna din personliga 5x5 bingobricka</span>
        </span>
        <svg class="chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 6l6 6-6 6"/></svg>
    </a>

    <a href="regler.html" class="menu-link secondary">
        <span class="icon-badge">
            <svg viewBox="0 0 24 24" fill="none" stroke="#f5f3ff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/>
                <path d="M4 4.5A2.5 2.5 0 0 1 6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15Z"/>
            </svg>
        </span>
        <span class="label-block">
            <span class="label">Spelinstruktioner</span>
            <span class="desc">Hur man spelar, rättar och vinner.</span>
        </span>
        <svg class="chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 6l6 6-6 6"/></svg>
    </a>
</main>

</body>
</html>
