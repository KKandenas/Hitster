<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hitster Companion</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-image: url('hitster-background.png'); /* Din snygga neonbakgrund */
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            background-color: #121212;
            color: #ffffff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }
        .container {
            width: 100%;
            max-width: 400px;
            text-align: center;
            background-color: rgba(18, 18, 18, 0.85); /* Halvtransparent mörk box så texten syns bra */
            padding: 30px 20px;
            border-radius: 16px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
            backdrop-filter: blur(4px);
            -webkit-backdrop-filter: blur(4px);
        }
        h1 { color: #f39c12; margin-top: 0; margin-bottom: 30px; }
        button {
            width: 100%;
            padding: 18px;
            background-color: #f39c12;
            border: none;
            border-radius: 8px;
            color: white;
            font-size: 20px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(243, 156, 18, 0.4);
            transition: background 0.2s, transform 0.1s;
        }
        button:active { 
            background-color: #e67e22; 
            transform: scale(0.98);
        }
        #resultatBox {
            margin-top: 30px;
            padding: 25px 15px;
            border-radius: 8px;
            background-color: rgba(30, 30, 30, 0.9);
            border: 2px dashed #f39c12;
            display: none;
            animation: fadeIn 0.3s ease-in-out;
        }
        .utmaning-titel { font-size: 24px; font-weight: bold; color: #f1c40f; margin-bottom: 12px; }
        .utmaning-info { font-size: 16px; color: #bdc3c7; line-height: 1.4; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Hitster Slumpare</h1>
    
    <button onclick="slumpaUtmaning()">Slumpa Utmaning!</button>

    <div id="resultatBox">
        <div class="utmaning-titel" id="utmaningTitel"></div>
        <div class="utmaning-info" id="utmaningInfo"></div>
    </div>
</div>

<script>
function slumpaUtmaning() {
    const valen = [
        { 
            titel: "Årtal ± 2 år", 
            info: "Gissa vilket år låten släpptes. Du vinner poäng/kortet om du är max 2 år ifrån det rätta svaret." 
        },
        { 
            titel: "Årtal ± 4 år", 
            info: "Gissa vilket år låten släpptes. Du får en generös felmarginal på upp till 4 år åt båda hållen!" 
        },
        { 
            titel: "Årtionde", 
            info: "Du behöver inte pricka exakt år. Det räcker att du gissar rätt årtionde (t.ex. 80-talet, 90-talet)." 
        },
        { 
            titel: "Före eller efter 2000?", 
            info: "Det enklaste valet! Gissa bara om låten släpptes före år 2000, eller år 2000 och senare." 
        },
        { 
            titel: "Artist", 
            info: "Glöm årtalet! För att ta poäng på den här låten måste du kunna namnet på artisten eller gruppen." 
        }
    ];

    const slumpIndex = Math.floor(Math.random() * valen.length);
    const vald = valen[slumpIndex];

    document.getElementById('utmaningTitel').innerText = vald.titel;
    document.getElementById('utmaningInfo').innerText = vald.info;
    document.getElementById('resultatBox').style.display = 'block';
}
</script>

</body>
</html>
