name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.6'
          channel: stable

      - name: Install Flutter dependencies
        working-directory: flutter_app
        run: flutter pub get

      - name: Build Flutter web app
        working-directory: flutter_app
        run: flutter build web --no-web-resources-cdn --base-href /Hitster/app/

      - name: Assemble site
        run: |
          mkdir -p site
          cp index.html generator.html hitsterbingo.html regler.html style.css site/
          touch site/.nojekyll
          mkdir -p site/app
          cp -r flutter_app/build/web/. site/app/

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/deploy-pages@v4
        id: deployment
