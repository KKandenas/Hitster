<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Hitster Bingo</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-image: url('hitster-background.png'); /* Använder samma snygga bakgrund */
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            background-color: #121212;
            color: #ffffff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            min-height: 100vh;
            margin: 0;
            padding: 15px;
            box-sizing: border-box;
        }
        .container {
            width: 100%;
            max-width: 420px;
            text-align: center;
            background-color: rgba(18, 18, 18, 0.85);
            padding: 20px 15px;
            border-radius: 16px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
            backdrop-filter: blur(4px);
            -webkit-backdrop-filter: blur(4px);
            box-sizing: border-box;
        }
        h1 { color: #f39c12; margin-top: 0; margin-bottom: 15px; font-size: 24px; }
        
        /* Färgförklaring / Legend */
        .legend {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 8px;
            margin-bottom: 20px;
            padding: 10px;
            background: rgba(255,255,255,0.05);
            border-radius: 8px;
            font-size: 12px;
            text-align: left;
        }
        .legend-item {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .color-box {
            width: 16px;
            height: 16px;
            border-radius: 4px;
            flex-shrink: 0;
        }

        /* Bingobrickan (5x5) */
        .bingo-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 6px;
            margin-bottom: 20px;
            aspect-ratio: 1 / 1; /* Gör brickan helt kvadratisk */
        }
        .bingo-cell {
            border-radius: 8px;
            cursor: pointer;
            position: relative;
            transition: transform 0.1s, opacity 0.2s;
            box-shadow: inset 0 0 10px rgba(0,0,0,0.3);
            border: 1px solid rgba(255,255,255,0.1);
        }
        .bingo-cell:active {
            transform: scale(0.92);
        }
        
        /* Kryss-markering */
        .bingo-cell.checked::after {
            content: "X";
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 28px;
            font-weight: 900;
            color: #ffffff;
            text-shadow: 0px 0px 6px rgba(0, 0, 0, 0.8), 0px 0px 2px rgba(0, 0, 0, 1);
        }
        /* Gör avbockade rutor lite mörkare för tydlighet */
        .bingo-cell.checked {
            opacity: 0.6;
            filter: brightness(0.7);
        }

        /* Knapp för ny bricka */
        button {
            width: 100%;
            padding: 12px;
            background-color: #f39c12;
            border: none;
            border-radius: 8px;
            color: white;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.2s;
        }
        button:active { background-color: #e67e22; }

        /* De 5 färgteman (Neon-aktiga för att passa bakgrunden) */
        .c-ar2 { background-color: #e74c3c; } /* Röd */
        .c-ar4 { background-color: #3498db; } /* Blå */
        .c-artionde { background-color: #9b59b6; } /* Lila */
        .c-sekelskifte { background-color: #2ecc71; } /* Grön */
        .c-artist { background-color: #f1c40f; } /* Gul */
    </style>
</head>
<body>

<div class="container">
    <h1>Hitster Bingo</h1>
    
    <div class="legend">
        <div class="legend-item"><div class="color-box c-ar2"></div> <span>Årtal ± 2 år (Röd)</span></div>
        <div class="legend-item"><div class="color-box c-ar4"></div> <span>Årtal ± 4 år (Blå)</span></div>
        <div class="legend-item"><div class="color-box c-artionde"></div> <span>Årtionde (Lila)</span></div>
        <div class="legend-item"><div class="color-box c-sekelskifte"></div> <span>Före/Efter 2000 (Grön)</span></div>
        <div class="legend-item" style="grid-column: span 2;"><div class="color-box c-artist"></div> <span>Artist (Gul)</span></div>
    </div>

    <div class="bingo-grid" id="bingoGrid"></div>

    <button onclick="genereraNyBricka()">Generera ny bricka</button>
</div>

<script>
    // De 5 olika klasserna baserat på alternativen
    const farger = ['c-ar2', 'c-ar4', 'c-artionde', 'c-sekelskifte', 'c-artist'];

    function genereraNyBricka() {
        if(confirm("Vill du verkligen starta ett nytt spel och rensa brickan?")) {
            skapaBricka();
        }
    }

    function skapaBricka() {
        const grid = document.getElementById('bingoGrid');
        grid.innerHTML = ''; // Rensa gamla rutor

        // Skapa 25 rutor (5x5)
        for (let i = 0; i < 25; i++) {
            const cell = document.createElement('div');
            
            // Slumpa en färg till rutan
            const slumpFarg = farger[Math.floor(Math.random() * farger.length)];
            cell.classList.add('bingo-cell', slumpFarg);

            // Lägg till klick-funktion (Kryssa i / Välj bort)
            cell.addEventListener('click', function() {
                this.classList.toggle('checked');
            });

            grid.appendChild(cell);
        }
    }

    // Starta med en slumpad bricka direkt när appen öppnas
    skapaBricka();
</script>

</body>
</html>
