<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Hitster Bingo</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

<nav class="nav-bar">
    <a href="index.html" class="nav-btn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 11.5 12 4l9 7.5"/><path d="M5 10v9a1 1 0 0 0 1 1h4v-6h4v6h4a1 1 0 0 0 1-1v-9"/></svg>
        Hem
    </a>
    <a href="generator.html" class="nav-btn accent">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="4"/><circle cx="8" cy="8" r="1.4" fill="currentColor" stroke="none"/><circle cx="16" cy="8" r="1.4" fill="currentColor" stroke="none"/><circle cx="12" cy="12" r="1.4" fill="currentColor" stroke="none"/><circle cx="8" cy="16" r="1.4" fill="currentColor" stroke="none"/><circle cx="16" cy="16" r="1.4" fill="currentColor" stroke="none"/></svg>
        Slumpa utmaning
    </a>
</nav>

<main class="container" style="max-width:420px;">
    <h1 class="title" style="font-size:24px;">Hitster Bingo</h1>

    <div class="legend">
        <div class="legend-item"><div class="color-box c-ar2"></div> <span>Årtal ± 2 år (Röd)</span></div>
        <div class="legend-item"><div class="color-box c-ar4"></div> <span>Årtal ± 4 år (Blå)</span></div>
        <div class="legend-item"><div class="color-box c-artionde"></div> <span>Årtionde (Lila)</span></div>
        <div class="legend-item"><div class="color-box c-sekelskifte"></div> <span>Före/Efter 2000 (Grön)</span></div>
        <div class="legend-item span-2"><div class="color-box c-artist"></div> <span>Artist (Gul)</span></div>
    </div>

    <div class="bingo-grid" id="bingoGrid"></div>

    <button class="action-btn" onclick="genereraNyBricka()">
        <svg viewBox="0 0 24 24" fill="none" stroke="#1a0b14" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 0 1 15-6.7L21 8"/><path d="M21 3v5h-5"/><path d="M21 12a9 9 0 0 1-15 6.7L3 16"/><path d="M3 21v-5h5"/></svg>
        Generera ny bricka
    </button>
</main>

<script>
    const basFarger = ['c-ar2', 'c-ar4', 'c-artionde', 'c-sekelskifte', 'c-artist'];
    const checkIkon = '<svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M5 13l4 4L19 7"/></svg>';

    function genereraNyBricka() {
        if(confirm("Vill du verkligen starta ett nytt spel och rensa brickan?")) {
            localStorage.removeItem('hitster_bingo_layout');
            localStorage.removeItem('hitster_bingo_checked');
            skapaBricka();
        }
    }

    function skapaBricka() {
        const grid = document.getElementById('bingoGrid');
        grid.innerHTML = '';

        let rutaPool = [];

        // Kolla om det redan finns en sparad bricka i telefonens minne
        const sparadLayout = JSON.parse(localStorage.getItem('hitster_bingo_layout'));
        const sparadeKryss = JSON.parse(localStorage.getItem('hitster_bingo_checked')) || [];

        if (sparadLayout) {
            rutaPool = sparadLayout;
        } else {
            // Skapa ny balanserad pool
            basFarger.forEach(farg => {
                for (let i = 0; i < 5; i++) { rutaPool.push(farg); }
            });
            // Blanda poolen
            for (let i = rutaPool.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [rutaPool[i], rutaPool[j]] = [rutaPool[j], rutaPool[i]];
            }
            // Spara den nya layouten
            localStorage.setItem('hitster_bingo_layout', JSON.stringify(rutaPool));
        }

        // Bygg rutorna
        for (let i = 0; i < 25; i++) {
            const cell = document.createElement('div');
            cell.classList.add('bingo-cell', rutaPool[i]);
            cell.dataset.index = i;

            const check = document.createElement('div');
            check.classList.add('check-mark');
            check.innerHTML = checkIkon;
            cell.appendChild(check);

            // Om rutan var kryssad innan, lägg till krysset igen
            if (sparadeKryss.includes(i)) {
                cell.classList.add('checked');
            }

            cell.addEventListener('click', function() {
                this.classList.toggle('checked');
                uppdateraSparadeKryss();
            });

            grid.appendChild(cell);
        }
    }

    function uppdateraSparadeKryss() {
        const checkedCells = document.querySelectorAll('.bingo-cell.checked');
        const checkedIndices = [];
        checkedCells.forEach(cell => {
            checkedIndices.push(parseInt(cell.dataset.index));
        });
        localStorage.setItem('hitster_bingo_checked', JSON.stringify(checkedIndices));
    }

    // Läs in brickan direkt vid start
    skapaBricka();
</script>

</body>
</html>
